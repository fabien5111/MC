<!DOCTYPE html>
<html class="light" lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Maryse Club — Mode exécution d'une recette planifiée.">
<meta name="theme-color" content="#300a12">
<title>Exécution | Maryse-Club</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Work+Sans:wght@400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script id="tailwind-config">
  tailwind.config = { darkMode: "class", theme: { extend: {
    "colors": {"on-primary-container":"#c1828b","tertiary-fixed-dim":"#e0bec2","primary-fixed-dim":"#fab4bd","secondary-container":"#ffc6ce","surface-tint":"#854f57","on-tertiary-fixed":"#291619","on-primary":"#ffffff","surface-variant":"#efdfde","secondary-fixed":"#ffd9de","outline":"#847374","outline-variant":"#d6c2c3","error-container":"#ffdad6","surface-dim":"#e7d6d6","surface-container-lowest":"#ffffff","on-secondary":"#ffffff","inverse-primary":"#fab4bd","on-tertiary":"#ffffff","tertiary-container":"#3b262a","on-tertiary-container":"#aa8c90","on-secondary-fixed":"#311118","secondary":"#7e5259","tertiary":"#251216","primary":"#300a12","inverse-surface":"#382e2e","primary-fixed":"#ffd9dd","tertiary-fixed":"#fddade","surface-container-high":"#f5e4e4","on-primary-fixed-variant":"#6a3840","surface-container-low":"#fff0f0","on-error":"#ffffff","on-surface-variant":"#514345","background":"#fff8f7","inverse-on-surface":"#feedec","secondary-fixed-dim":"#f0b8c0","primary-container":"#4a1e26","on-secondary-fixed-variant":"#633b42","surface":"#fff8f7","surface-container":"#fbeae9","on-tertiary-fixed-variant":"#584044","on-background":"#221a1a","surface-container-highest":"#efdfde","surface-bright":"#fff8f7","on-surface":"#221a1a","error":"#ba1a1a","on-primary-fixed":"#350e16","on-error-container":"#93000a","on-secondary-container":"#7b5056"},
    "borderRadius": {"DEFAULT":"0.125rem","lg":"0.25rem","xl":"0.5rem","full":"0.75rem"},
    "spacing": {"gutter":"24px","margin-mobile":"16px","margin-desktop":"64px","unit":"8px","container-max":"1200px"},
    "fontFamily": {"headline-lg":["Playfair Display"],"display-lg":["Playfair Display"],"headline-md":["Playfair Display"],"body-md":["Work Sans"],"body-lg":["Work Sans"],"label-md":["Work Sans"],"headline-lg-mobile":["Playfair Display"],"logo":["Great Vibes","cursive"]},
    "fontSize": {"headline-lg":["40px",{"lineHeight":"48px","fontWeight":"600"}],"display-lg":["64px",{"lineHeight":"72px","letterSpacing":"-0.02em","fontWeight":"700"}],"headline-md":["28px",{"lineHeight":"36px","fontWeight":"500"}],"body-md":["16px",{"lineHeight":"24px","fontWeight":"400"}],"body-lg":["18px",{"lineHeight":"28px","fontWeight":"400"}],"label-md":["14px",{"lineHeight":"20px","letterSpacing":"0.05em","fontWeight":"600"}],"headline-lg-mobile":["32px",{"lineHeight":"40px","fontWeight":"600"}]}
  } } }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  html:not(.auth-ready) [data-auth="logged-in"] { display: none !important; }
  body { background-color:#fff8f7; color:#221a1a; font-family:'Work Sans',sans-serif; }
  details summary::-webkit-details-marker { display:none; }
  .maryse-logo-font { font-family:'Great Vibes',cursive; }
  image-slot { display:block; }
</style>
</head>
<body class="bg-background">

<!-- Header compact (usage cuisine / mobile) -->
<header class="bg-surface/80 backdrop-blur-md border-b border-outline-variant/30 sticky top-0 z-50">
<div class="max-w-[900px] mx-auto flex justify-between items-center px-margin-mobile py-3">
  <a class="maryse-logo-font text-3xl text-primary leading-none" href="index.html">maryse club</a>
  <a id="back-link" href="profil.html#planning" class="font-label-md text-label-md text-on-surface-variant hover:text-primary flex items-center gap-1"><span class="material-symbols-outlined text-[18px]">arrow_back</span> Planning</a>
</div>
</header>

<main class="max-w-[900px] mx-auto px-margin-mobile py-6 pb-32">
  <div class="flex items-baseline justify-between flex-wrap gap-2 mb-2">
    <h1 id="exec-title" class="font-headline-lg text-headline-lg-mobile text-primary">Session de préparation</h1>
    <span id="exec-status" class="font-label-md text-[12px] px-3 py-1 rounded-full bg-secondary/90 text-white"></span>
  </div>
  <p id="exec-meta" class="text-on-surface-variant text-sm mb-6"></p>

  <!-- Rempli par la phase 3 (mise en place, jalons, étapes, résumé) -->
  <div id="exec-body" class="flex flex-col gap-6">
    <p class="text-on-surface-variant italic">Chargement de la session…</p>
  </div>
</main>

<script src="image-slot.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="db.js"></script>
<script>
  const esc = s => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;');
  const STATUS_LBL = { en_cours: 'En cours', terminee: 'Terminée', abandonnee: 'Abandonnée' };
  let currentExec = null;

  async function loadExecution() {
    const user = await initAuthUI();
    if (!user) { window.location.href = 'connexion.html'; return; }
    const id = new URLSearchParams(location.search).get('id');
    if (!id) { window.location.href = 'profil.html#planning'; return; }
    const exec = await getExecution(id);
    if (!exec) {
      document.getElementById('exec-body').innerHTML = '<p class="text-error">Session introuvable.</p>';
      return;
    }
    currentExec = exec;
    const s = exec.snapshot || {};
    document.getElementById('exec-title').textContent = s.titre || 'Session de préparation';
    document.title = `Exécution — ${s.titre || ''} | Maryse-Club`;
    document.getElementById('exec-status').textContent = STATUS_LBL[exec.status] || exec.status;
    const deg = exec.degustation_at
      ? new Date(exec.degustation_at).toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' })
      : null;
    const nbEtapes = (s.jalons || []).reduce((n, j) => n + (j.etapes || []).length, 0);
    document.getElementById('exec-meta').textContent = [
      deg ? `Dégustation prévue ${deg}` : '',
      `${(s.jalons || []).length} jalon${(s.jalons || []).length > 1 ? 's' : ''} · ${nbEtapes} étape${nbEtapes > 1 ? 's' : ''}`,
    ].filter(Boolean).join(' — ');
    renderExecution();
  }

  // ── Écran d'exécution guidé par jalons ───────────────────────
  const MIN = 60000;
  const stepDur = e => (e.prep || 0) + (e.attente || 0) + (e.cuisson || 0);
  const jalonDur = j => (j.etapes || []).reduce((n, e) => n + stepDur(e), 0);
  const fmtHeure = d => d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  const fmtJour = d => d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
  const numify = v => { const n = parseFloat(String(v ?? '').replace(',', '.')); return isNaN(n) ? null : n; };
  const fmtNum = n => String(+(+n).toFixed(2)).replace('.', ',');

  // Jour réel du jalon (date de dégustation − offset jours)
  function jalonDate(j) {
    if (!currentExec.degustation_at) return null;
    const d = new Date(currentExec.degustation_at);
    d.setDate(d.getDate() - (j.offset || 0));
    return d;
  }
  // Horaire cible de démarrage : heure de dégustation du jour − durée cumulée du jalon
  function jalonTarget(j) {
    const d = jalonDate(j);
    return d ? new Date(d.getTime() - jalonDur(j) * MIN) : null;
  }

  async function saveSnapshot() {
    try { await updateExecution(currentExec.id, { snapshot: currentExec.snapshot }); }
    catch (e) { alert('Sauvegarde impossible : ' + e.message); }
  }

  // Tempo du jalon courant : heure attendue = cible + durées des étapes déjà faites
  function tempoChip() {
    if (currentExec.status !== 'en_cours' || !currentExec.degustation_at) return '';
    const jalons = currentExec.snapshot.jalons || [];
    const j = jalons.find(x => (x.etapes || []).some(e => !e.faite));
    if (!j) return '';
    const target = jalonTarget(j);
    if (!target) return '';
    const doneMin = j.etapes.filter(e => e.faite).reduce((n, e) => n + stepDur(e), 0);
    const expected = new Date(target.getTime() + doneMin * MIN);
    const diff = Math.round((Date.now() - expected.getTime()) / MIN); // > 0 : retard
    if (diff < -720) return `<span class="font-label-md text-[12px] px-3 py-1 rounded-full bg-surface-container-high text-on-surface-variant">À démarrer le ${esc(fmtJour(target))} vers ${esc(fmtHeure(target))}</span>`;
    if (diff > 15) return `<span class="font-label-md text-[12px] px-3 py-1 rounded-full bg-error text-white">En retard d'environ ${esc(formatTime(diff))}</span>`;
    if (diff < -15) return `<span class="font-label-md text-[12px] px-3 py-1 rounded-full bg-green-700 text-white">En avance d'environ ${esc(formatTime(-diff))}</span>`;
    return '<span class="font-label-md text-[12px] px-3 py-1 rounded-full bg-secondary text-white">Dans les temps</span>';
  }

  function ingredientRow(ji, ei, ii, ing, readOnly) {
    const prevTxt = [typeof ing.quantite_prevue === 'number' ? fmtNum(ing.quantite_prevue) : (ing.quantite_prevue || ''), ing.unite].filter(Boolean).join(' ');
    const struck = ing.fait ? ' line-through opacity-50' : '';
    return `
      <li class="flex items-center gap-3 py-2.5 border-b border-outline-variant/30" data-ing="${ji}-${ei}-${ii}">
        <input type="checkbox" ${ing.fait ? 'checked' : ''} ${readOnly ? 'disabled' : ''} onchange="execToggleIng(${ji},${ei},${ii},this)"
          class="w-6 h-6 rounded border-outline text-primary focus:ring-primary cursor-pointer shrink-0">
        <span data-ing-name class="font-body-md flex-1 min-w-0${struck}">${esc(ing.nom)}</span>
        <span data-ing-prev class="font-label-md text-label-md text-on-surface-variant whitespace-nowrap${struck}">prévu ${esc(prevTxt)}</span>
        <input type="number" min="0" step="any" inputmode="decimal" placeholder="réel" ${readOnly ? 'disabled' : ''}
          value="${ing.quantite_reelle != null ? ing.quantite_reelle : ''}"
          onchange="execIngReal(${ji},${ei},${ii},this)"
          class="border border-outline-variant rounded px-2 py-1.5 font-body-md text-sm text-center" style="width:5rem">
        <span class="text-sm text-on-surface-variant">${esc(ing.unite || '')}</span>
      </li>`;
  }

  function stepCard(ji, ei, e, readOnly, isPending) {
    return `
      <div class="border border-outline-variant rounded-lg bg-white overflow-hidden${e.faite ? ' opacity-70' : ''}" ${isPending ? 'data-step-pending' : ''}>
        <label class="flex items-start gap-4 p-4 cursor-pointer select-none">
          <input type="checkbox" ${e.faite ? 'checked' : ''} ${readOnly ? 'disabled' : ''} onchange="execToggleStep(${ji},${ei},this)"
            class="w-8 h-8 rounded border-outline text-primary focus:ring-primary cursor-pointer shrink-0 mt-0.5">
          <span class="flex-1 min-w-0">
            <span class="font-headline-md text-[20px] text-primary block${e.faite ? ' line-through' : ''}">${esc(e.titre)}</span>
            <span class="text-[12px] font-label-md text-on-surface-variant">${[
              e.prep ? 'PRÉP ' + formatTime(e.prep).toUpperCase() : '',
              e.attente ? 'ATTENTE ' + formatTime(e.attente).toUpperCase() : '',
              e.cuisson ? 'CUISSON ' + formatTime(e.cuisson).toUpperCase() : '',
            ].filter(Boolean).join(' · ')}</span>
          </span>
        </label>
        ${(e.ingredients || []).length ? `
        <ul class="px-4 pb-2">${e.ingredients.map((ing, ii) => ingredientRow(ji, ei, ii, ing, readOnly)).join('')}</ul>` : ''}
        ${e.description ? `<div class="px-4 pb-3 font-body-md text-body-md leading-relaxed text-on-surface">${sanitizeRich(e.description)}</div>` : ''}
        ${e.tips ? `
        <div class="mx-4 mb-3 p-3 bg-primary/5 border-l-4 border-primary rounded">
          <p class="font-label-md text-[11px] uppercase tracking-widest text-primary mb-1">Conseils &amp; astuces</p>
          <div class="font-body-md text-sm italic">${sanitizeRich(e.tips)}</div>
        </div>` : ''}
        ${e.video ? `<div class="px-4 pb-3"><a href="${esc(e.video)}" target="_blank" rel="noopener" class="flex items-center gap-2 text-primary font-label-md text-label-md hover:underline"><span class="material-symbols-outlined">play_circle</span> Voir la vidéo de l'étape</a></div>` : ''}
        <div class="px-4 pb-4">
          <textarea rows="2" placeholder="Commentaire sur cette étape (sauvegardé automatiquement)…" ${readOnly ? 'disabled' : ''}
            oninput="execStepComment(${ji},${ei},this)"
            class="w-full border border-outline-variant rounded px-3 py-2 font-body-md text-sm bg-surface-container-low focus:ring-1 focus:ring-primary">${esc(e.commentaire || '')}</textarea>
        </div>
      </div>`;
  }

  function renderExecution() {
    const s = currentExec.snapshot || {};
    const jalons = s.jalons || [];
    const readOnly = currentExec.status !== 'en_cours' || new URLSearchParams(location.search).get('lecture') === '1';
    const all = jalons.flatMap(j => j.etapes || []);
    const done = all.filter(e => e.faite).length;
    const curIdx = jalons.findIndex(j => (j.etapes || []).some(e => !e.faite));
    let pendingMarked = false;

    const jalonsHtml = jalons.map((j, ji) => {
      const jDone = (j.etapes || []).every(e => e.faite);
      const isCurrent = ji === curIdx;
      const dt = jalonDate(j);
      const target = jalonTarget(j);
      const etapesHtml = (j.etapes || []).map((e, ei) => {
        const isPending = !pendingMarked && !e.faite;
        if (isPending) pendingMarked = true;
        return stepCard(ji, ei, e, readOnly, isPending);
      }).join('');
      return `
      <details ${isCurrent || (readOnly && !jDone) ? 'open' : ''} class="rounded-xl border ${isCurrent ? 'border-primary shadow-md' : 'border-outline-variant'} bg-surface-container-lowest overflow-hidden" data-jalon="${ji}">
        <summary class="flex items-center gap-4 p-4 cursor-pointer list-none ${isCurrent ? 'bg-primary/5' : 'bg-surface-container-low'}">
          <span class="w-10 h-10 rounded-full flex items-center justify-center font-bold shrink-0 ${jDone ? 'bg-green-700 text-white' : (isCurrent ? 'bg-primary text-white' : 'bg-surface-container-high text-on-surface-variant')}">
            ${jDone ? '<span class="material-symbols-outlined text-[22px]">check</span>' : ji + 1}
          </span>
          <span class="flex-1 min-w-0">
            <span class="font-label-md text-label-md text-primary block">${j.offset > 0 ? `Jour J − ${j.offset}` : 'Jour J'}${dt ? ' — ' + esc(fmtJour(dt)) : ''}</span>
            <span class="text-[12px] text-on-surface-variant">${target ? `À démarrer vers ${esc(fmtHeure(target))} · ` : ''}${esc(formatTime(jalonDur(j)))} de travail · ${(j.etapes || []).filter(e => e.faite).length}/${(j.etapes || []).length} étape${(j.etapes || []).length > 1 ? 's' : ''}</span>
          </span>
          <span class="material-symbols-outlined text-on-surface-variant">expand_more</span>
        </summary>
        <div class="p-4 flex flex-col gap-4">${etapesHtml}</div>
      </details>`;
    }).join('');

    document.getElementById('exec-body').innerHTML = `
      <div class="flex items-center gap-4 flex-wrap">
        <div class="flex-1 min-w-[180px]">
          <div class="flex justify-between text-[12px] font-label-md text-on-surface-variant mb-1">
            <span>Progression</span><span id="exec-progress-txt">${done} / ${all.length} étapes</span>
          </div>
          <div class="h-2 rounded-full bg-surface-container-high overflow-hidden">
            <div id="exec-progress-bar" class="h-full bg-primary transition-all" style="width:${all.length ? Math.round(done / all.length * 100) : 0}%"></div>
          </div>
        </div>
        <span id="exec-tempo">${tempoChip()}</span>
      </div>
      ${jalonsHtml}`;
  }

  // ── Actions (persistance immédiate pour permettre la reprise) ──
  window.execToggleStep = async function (ji, ei, cb) {
    const e = currentExec.snapshot.jalons[ji].etapes[ei];
    e.faite = cb.checked;
    e.date_faite = cb.checked ? new Date().toISOString() : null;
    await saveSnapshot();
    renderExecution();
    // avance automatique : défilement vers la prochaine étape à faire
    if (cb.checked) document.querySelector('[data-step-pending]')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
  };

  window.execToggleIng = async function (ji, ei, ii, cb) {
    const ing = currentExec.snapshot.jalons[ji].etapes[ei].ingredients[ii];
    ing.fait = cb.checked;
    const row = document.querySelector(`[data-ing="${ji}-${ei}-${ii}"]`);
    row?.querySelectorAll('[data-ing-name],[data-ing-prev]').forEach(el => {
      el.classList.toggle('line-through', cb.checked);
      el.classList.toggle('opacity-50', cb.checked);
    });
    await saveSnapshot();
  };

  window.execIngReal = async function (ji, ei, ii, input) {
    const ing = currentExec.snapshot.jalons[ji].etapes[ei].ingredients[ii];
    ing.quantite_reelle = numify(input.value); // uniquement dans l'exécution, jamais dans la recette
    await saveSnapshot();
  };

  const commentTimers = {};
  window.execStepComment = function (ji, ei, ta) {
    const key = ji + '-' + ei;
    clearTimeout(commentTimers[key]);
    commentTimers[key] = setTimeout(async () => {
      currentExec.snapshot.jalons[ji].etapes[ei].commentaire = ta.value;
      await saveSnapshot();
    }, 800);
  };

  loadExecution();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
</body>
</html>
