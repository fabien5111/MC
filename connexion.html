<!DOCTYPE html>
<html class="light" lang="fr">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<meta name="description" content="Rejoignez la communauté Maryse Club — créez un compte ou connectez-vous.">
<meta name="theme-color" content="#300a12">
<title>Maryse-Club | Connexion</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Work+Sans:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

</style>
<script id="tailwind-config">
  tailwind.config = { darkMode:"class", theme:{ extend:{
    "colors": {"inverse-on-surface":"#feedec","primary":"#300a12","inverse-primary":"#fab4bd","on-tertiary":"#ffffff","error-container":"#ffdad6","primary-container":"#4a1e26","on-primary-container":"#c1828b","surface-bright":"#fff8f7","tertiary-fixed-dim":"#e0bec2","surface-container-low":"#fff0f0","surface-container-high":"#f5e4e4","on-secondary-container":"#7b5056","tertiary":"#251216","on-secondary":"#ffffff","surface-container":"#fbeae9","secondary-fixed-dim":"#f0b8c0","secondary-fixed":"#ffd9de","secondary-container":"#ffc6ce","on-surface":"#221a1a","surface-variant":"#efdfde","primary-fixed-dim":"#fab4bd","surface-container-lowest":"#ffffff","on-secondary-fixed-variant":"#633b42","secondary":"#7e5259","outline":"#847374","outline-variant":"#d6c2c3","background":"#fff8f7","surface":"#fff8f7","inverse-surface":"#382e2e","on-secondary-fixed":"#311118","on-error":"#ffffff","on-background":"#221a1a","surface-container-highest":"#efdfde","surface-tint":"#854f57","on-error-container":"#93000a","error":"#ba1a1a","tertiary-fixed":"#fddade","on-primary-fixed":"#350e16","primary-fixed":"#ffd9dd","on-tertiary-fixed-variant":"#584044","surface-dim":"#e7d6d6","on-tertiary-container":"#aa8c90","on-primary":"#ffffff","on-surface-variant":"#514345","on-primary-fixed-variant":"#6a3840","tertiary-container":"#3b262a","on-tertiary-fixed":"#291619"},
    "borderRadius": {"DEFAULT":"0.125rem","lg":"0.25rem","xl":"0.5rem","full":"0.75rem"},
    "spacing": {"margin-mobile":"16px","margin-desktop":"64px","gutter":"24px","unit":"8px","container-max":"1200px"},
    "fontFamily": {"headline-lg-mobile":["Playfair Display"],"headline-lg":["Playfair Display"],"headline-md":["Playfair Display"],"body-lg":["Work Sans"],"body-md":["Work Sans"],"display-lg":["Playfair Display"],"label-md":["Work Sans"],"logo":["Great Vibes","cursive"]},
    "fontSize": {"headline-lg-mobile":["32px",{"lineHeight":"40px","fontWeight":"600"}],"headline-lg":["40px",{"lineHeight":"48px","fontWeight":"600"}],"headline-md":["28px",{"lineHeight":"36px","fontWeight":"500"}],"body-lg":["18px",{"lineHeight":"28px","fontWeight":"400"}],"body-md":["16px",{"lineHeight":"24px","fontWeight":"400"}],"display-lg":["64px",{"lineHeight":"72px","letterSpacing":"-0.02em","fontWeight":"700"}],"label-md":["14px",{"lineHeight":"20px","letterSpacing":"0.05em","fontWeight":"600"}]}
  } } }
</script>
</head>
<body class="bg-surface font-body-md text-on-surface selection:bg-secondary-container selection:text-on-secondary-container overflow-x-hidden min-h-screen flex flex-col">

<header class="fixed top-0 left-0 right-0 z-50 bg-surface/80 backdrop-blur-md">
<nav class="flex justify-center items-center w-full px-margin-mobile md:px-margin-desktop py-6 max-w-container-max mx-auto">
<a class="maryse-logo-font text-4xl text-primary leading-none" href="index.html">maryse club</a>
</nav>
</header>

<main class="flex-grow flex items-center justify-center relative px-margin-mobile py-24 md:py-32">
<div class="absolute inset-0 overflow-hidden -z-10 pointer-events-none">
<div class="glow-sphere absolute -top-1/4 -right-1/4 w-[600px] h-[600px] rounded-full bg-secondary-container/20 blur-[120px]"></div>
<div class="glow-sphere absolute -bottom-1/4 -left-1/4 w-[500px] h-[500px] rounded-full bg-tertiary-fixed/10 blur-[100px]" style="animation-delay:-5s;"></div>
</div>

<div class="w-full max-w-md bg-surface-container-lowest border border-outline-variant p-8 md:p-12 transition-all duration-500 hover:shadow-[0_32px_64px_-12px_rgba(74,30,38,0.05)]">
<div class="text-center mb-10">
<h1 class="text-headline-lg-mobile md:text-headline-lg font-headline-lg text-primary mb-2" id="auth-title">Créer un compte</h1>
<p class="font-body-md text-body-md text-on-surface-variant" id="auth-subtitle">Rejoignez la communauté de gourmands</p>
</div>

<div class="space-y-4 mb-8">
<button class="w-full flex items-center justify-center gap-3 py-3 px-6 border border-outline-variant hover:bg-surface-container-low transition-colors duration-300" onclick="window.location.href='index.html'">
<svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path></svg>
<span class="font-label-md text-label-md text-on-surface">Continuer avec Google</span>
</button>
<button class="w-full flex items-center justify-center gap-3 py-3 px-6 border border-outline-variant hover:bg-surface-container-low transition-colors duration-300" onclick="window.location.href='index.html'">
<svg class="w-5 h-5 fill-[#1877F2]" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path></svg>
<span class="font-label-md text-label-md text-on-surface">Continuer avec Facebook</span>
</button>
</div>

<div class="relative flex items-center mb-8"><div class="flex-grow border-t border-outline-variant"></div><span class="flex-shrink mx-4 font-body-md text-on-surface-variant italic">Ou</span><div class="flex-grow border-t border-outline-variant"></div></div>

<form class="space-y-6" onsubmit="event.preventDefault();window.location.href='index.html';">
<div class="space-y-1" id="field-name">
<label class="font-label-md text-label-md text-secondary ml-1" for="name">Nom complet</label>
<input class="w-full bg-transparent border-b border-outline-variant py-3 px-1 focus:outline-none focus:border-primary transition-all duration-300 font-body-md text-body-md placeholder:text-on-surface-variant/40" id="name" placeholder="Jean Dupont" type="text">
</div>
<div class="space-y-1">
<label class="font-label-md text-label-md text-secondary ml-1" for="email">Adresse e-mail</label>
<input class="w-full bg-transparent border-b border-outline-variant py-3 px-1 focus:outline-none focus:border-primary transition-all duration-300 font-body-md text-body-md placeholder:text-on-surface-variant/40" id="email" placeholder="nom@exemple.com" type="email">
</div>
<div class="space-y-1">
<label class="font-label-md text-label-md text-secondary ml-1" for="password">Mot de passe</label>
<div class="relative">
<input class="w-full bg-transparent border-b border-outline-variant py-3 px-1 focus:outline-none focus:border-primary transition-all duration-300 font-body-md text-body-md placeholder:text-on-surface-variant/40" id="password" placeholder="••••••••" type="password">
<button class="absolute right-2 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button" id="pw-toggle"><span class="material-symbols-outlined">visibility</span></button>
</div>
<a href="#" class="hidden text-[12px] text-secondary hover:text-primary mt-2 ml-1 inline-block" id="forgot-link">Mot de passe oublié ?</a>
</div>
<div class="flex items-start gap-3 py-2" id="field-terms">
<input class="mt-1 w-4 h-4 border-outline rounded-none text-primary-container focus:ring-primary-container transition-all cursor-pointer" id="terms" type="checkbox">
<label class="font-body-md text-sm text-on-surface-variant cursor-pointer select-none" for="terms">J'accepte les <a class="text-primary underline underline-offset-4 hover:text-secondary-fixed-dim transition-colors" href="#">conditions d'utilisation</a> et la politique de confidentialité.</label>
</div>
<button class="w-full bg-primary-container text-on-primary py-4 px-8 mt-4 hover:bg-primary transition-all duration-500 active:scale-[0.98] font-label-md text-label-md tracking-widest uppercase" type="submit" id="auth-submit">S'inscrire</button>
</form>

<div class="mt-10 text-center">
<p class="font-body-md text-body-md text-on-surface-variant" id="auth-switch-text">Déjà membre ? <a class="text-primary font-semibold underline underline-offset-4 hover:text-secondary transition-colors ml-1" href="#" onclick="event.preventDefault();toggleAuth();">Se connecter</a></p>
</div>
</div>
</main>

<footer class="mt-auto bg-surface-container-low border-t border-outline-variant">
<div class="flex flex-col md:flex-row justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-8 max-w-container-max mx-auto gap-6">
<div class="flex flex-col items-center md:items-start gap-2"><a class="maryse-logo-font text-3xl text-primary" href="index.html">maryse club</a><p class="font-body-md text-body-md text-secondary">© 2024 Maryse-Club. Tous droits réservés.</p></div>
<div class="flex flex-wrap justify-center gap-x-8 gap-y-4">
<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary underline transition-all" href="#">Conditions</a>
<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary underline transition-all" href="#">Confidentialité</a>
<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary underline transition-all" href="#">Contact</a>
</div>
</div>
</footer>

<script>
  let mode = 'signup';
  function toggleAuth(){ setMode(mode === 'signup' ? 'login' : 'signup'); }
  function setMode(m){
    mode = m;
    const isSignup = m === 'signup';
    document.getElementById('auth-title').textContent = isSignup ? 'Créer un compte' : 'Bon retour parmi nous';
    document.getElementById('auth-subtitle').textContent = isSignup ? 'Rejoignez la communauté de gourmands' : 'Connectez-vous à votre carnet de pâtisserie';
    document.getElementById('auth-submit').textContent = isSignup ? "S'inscrire" : 'Se connecter';
    document.getElementById('field-name').classList.toggle('hidden', !isSignup);
    document.getElementById('field-terms').classList.toggle('hidden', !isSignup);
    document.getElementById('forgot-link').classList.toggle('hidden', isSignup);
    document.getElementById('auth-switch-text').innerHTML = isSignup
      ? 'Déjà membre ? <a class="text-primary font-semibold underline underline-offset-4 hover:text-secondary transition-colors ml-1" href="#" onclick="event.preventDefault();toggleAuth();">Se connecter</a>'
      : 'Pas encore de compte ? <a class="text-primary font-semibold underline underline-offset-4 hover:text-secondary transition-colors ml-1" href="#" onclick="event.preventDefault();toggleAuth();">S\'inscrire</a>';
  }
  document.getElementById('pw-toggle').addEventListener('click', function(){
    const pw = document.getElementById('password');
    const isPw = pw.type === 'password';
    pw.type = isPw ? 'text' : 'password';
    this.querySelector('span').textContent = isPw ? 'visibility_off' : 'visibility';
  });
  if (location.hash === '#login' || location.search.includes('login')) setMode('login');
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
