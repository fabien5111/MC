<main class="max-w-[800px] mx-auto px-margin-mobile md:px-margin-desktop py-12">
  <div class="flex items-center gap-2 text-on-surface-variant font-label-md text-[12px] mb-8">
    <a class="hover:text-primary" href="profil.html#courses">Mes listes de courses</a>
    <span class="material-symbols-outlined text-[14px]">chevron_right</span>
    <span class="text-primary" id="bc-name">Liste de courses</span>
  </div>

  <div class="flex items-baseline justify-between flex-wrap gap-4 mb-8 border-b border-outline-variant pb-4">
    <h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary flex items-center gap-3"><span class="material-symbols-outlined text-[32px]">shopping_bag</span><span id="list-name">Liste de courses</span></h1>
    <span id="list-count" class="font-label-md text-label-md text-on-surface-variant"></span>
  </div>

  <ul id="items" class="flex flex-col"></ul>
  <p id="list-empty" class="text-on-surface-variant italic" style="display:none">Cette liste est vide.</p>
</main>

<script src="image-slot.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="db.js"></script>
<script>
  const esc = s => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;');
  let listItems = [];

  function refreshCount() {
    const done = listItems.filter(i => i.checked).length;
    document.getElementById('list-count').textContent =
      `${listItems.length} article${listItems.length > 1 ? 's' : ''}${done ? ` · ${done} coché${done > 1 ? 's' : ''}` : ''}`;
  }

  window.toggleItem = async function (itemId, cb) {
    const it = listItems.find(i => String(i.id) === String(itemId));
    if (!it) return;
    it.checked = cb.checked;
    const row = cb.closest('li');
    row.querySelectorAll('[data-txt]').forEach(s => { s.classList.toggle('line-through', cb.checked); s.classList.toggle('opacity-50', cb.checked); });
    refreshCount();
    await setShoppingItemChecked(itemId, cb.checked);
  };

  async function loadList() {
    const user = await initAuthUI();
    if (!user) { window.location.href = 'connexion.html'; return; }
    const id = new URLSearchParams(location.search).get('id');
    if (!id) { window.location.href = 'profil.html#planning'; return; }
    const list = await getShoppingList(id);
    if (!list) {
      document.getElementById('list-name').textContent = 'Liste introuvable';
      return;
    }
    document.getElementById('list-name').textContent = list.name;
    document.getElementById('bc-name').textContent = list.name;
    document.title = `${list.name} | Maryse-Club`;
    listItems = [...(list.shopping_list_items || [])].sort((a, b) =>
      (a.name || '').localeCompare(b.name || '', 'fr'));
    const ul = document.getElementById('items');
    if (!listItems.length) {
      document.getElementById('list-empty').style.display = '';
    } else {
      ul.innerHTML = listItems.map(i => `
        <li class="flex items-center gap-4 py-3 border-b border-outline-variant/30">
          <input type="checkbox" ${i.checked ? 'checked' : ''} onchange="toggleItem('${i.id}', this)"
            class="w-5 h-5 rounded border-outline text-primary focus:ring-primary cursor-pointer shrink-0">
          <span data-txt class="font-body-md text-body-md flex-1${i.checked ? ' line-through opacity-50' : ''}">${esc(i.name)}</span>
          <span data-txt class="font-label-md text-label-md text-primary whitespace-nowrap${i.checked ? ' line-through opacity-50' : ''}">${esc([i.quantity, i.unit].filter(Boolean).join(' '))}</span>
        </li>`).join('');
    }
    refreshCount();
  }

  loadList();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
</body>
</html>
